<body>

<div class="container">

<h2>🔐 安全本地 2FA 管理器</h2>

<div class="section">
<div class="section-title">主密码解锁</div>

<div class="form-group">
<input type="password" id="masterPwd" placeholder="输入主密码">
<button onclick="unlock()">解锁</button>
</div>

<div class="small">
首次使用会自动初始化保险库
</div>

<div class="section-title">添加账号</div>

<input id="accSecret" placeholder="2FA Secret">
<button onclick="addAccount()">添加</button>
</div>
</div>

<div class="section-title">加密备份</div>

<button onclick="exportBackup()">导出加密备份</button>
<button onclick="importBackup()">导入加密备份</button>

<textarea id="backupBox"
placeholder="这里显示备份数据"></textarea>

<script>

let localAccounts = [];
let masterPassword = "";

/* =========================
   安全加密模块
========================= */

const SecureVault = {

    async deriveKey(password,salt){

        const enc = new TextEncoder();

        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            enc.encode(password),
            {name:"PBKDF2"},
            false,
            ["deriveKey"]
        );

        return crypto.subtle.deriveKey(
            {
                name:"PBKDF2",
                salt:salt,
                iterations:250000,
                hash:"SHA-256"
            },
            keyMaterial,
            {
                name:"AES-GCM",
                length:256
            },
            false,
            ["encrypt","decrypt"]
        );
    },

    async encrypt(data,password){

        const enc = new TextEncoder();

        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));

        const key = await this.deriveKey(password,salt);

        const encrypted = await crypto.subtle.encrypt(
            {
                name:"AES-GCM",
                iv:iv
            },
            key,
            enc.encode(JSON.stringify(data))
        );

        return {
            salt:Array.from(salt),
            iv:Array.from(iv),
            data:Array.from(new Uint8Array(encrypted))
        };
    },

    async decrypt(payload,password){

        const dec = new TextDecoder();

        const salt = new Uint8Array(payload.salt);
        const iv = new Uint8Array(payload.iv);
        const data = new Uint8Array(payload.data);

        const key = await this.deriveKey(password,salt);

        const decrypted = await crypto.subtle.decrypt(
            {
                name:"AES-GCM",
                iv:iv
            },
            key,
            data
        );

        return JSON.parse(dec.decode(decrypted));
    }
};

/* =========================
   Base32 + TOTP
========================= */

const TOTP = {

    base32ToBytes(str){

        let cleaned = str
            .replace(/\s+/g,'')
            .replace(/1/g,'I')
            .replace(/0/g,'O')
            .replace(/8/g,'B')
            .toUpperCase();

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";

        let bits = "";

        for(let c of cleaned){

            let val = alphabet.indexOf(c);

            if(val === -1) continue;

            bits += val.toString(2).padStart(5,'0');
        }

        let bytes = [];

        for(let i=0;i+8<=bits.length;i+=8){

            bytes.push(parseInt(bits.substr(i,8),2));
        }

        return new Uint8Array(bytes);
    },

    async generate(secret){

        try{

            const secretBytes = this.base32ToBytes(secret);

            const epoch = Math.floor(Date.now()/1000);

            const time = Math.floor(epoch/30);

            const buf = new ArrayBuffer(8);

            const view = new DataView(buf);

            view.setUint32(4,time & 0xffffffff);
            view.setUint32(0,Math.floor(time / 0x100000000));

            const cryptoKey = await crypto.subtle.importKey(
                "raw",
                secretBytes,
                {
                    name:"HMAC",
                    hash:"SHA-1"
                },
                false,
                ["sign"]
            );

            const hmac = await crypto.subtle.sign(
                "HMAC",
                cryptoKey,
                buf
            );

            const bytes = new Uint8Array(hmac);

            const offset = bytes[bytes.length-1] & 0xf;

            const binary =
                ((bytes[offset] & 0x7f) << 24) |
                ((bytes[offset+1] & 0xff) << 16) |
                ((bytes[offset+2] & 0xff) << 8) |
                (bytes[offset+3] & 0xff);

            return (binary % 1000000)
                .toString()
                .padStart(6,'0');

        }catch(e){

            return "ERROR";
        }
    }
};

/* =========================
   数据存储
========================= */

async function saveVault(){

    const encrypted = await SecureVault.encrypt(
        localAccounts,
        masterPassword
    );

    localStorage.setItem(
        "secure_2fa_vault",
        JSON.stringify(encrypted)
    );
}

/* =========================
   解锁
========================= */

async function unlock(){

    const pwd = document
        .getElementById("masterPwd")
        .value;

    if(!pwd){

        alert("请输入主密码");
        return;
    }

    masterPassword = pwd;

    const raw = localStorage.getItem(
        "secure_2fa_vault"
    );

    if(!raw){

        localAccounts = [];

        await saveVault();

        alert("首次初始化成功");

    }else{

        try{

            localAccounts = await SecureVault.decrypt(
                JSON.parse(raw),
                pwd
            );

            alert("解锁成功");

        }catch(e){

            alert("密码错误");

            return;
        }
    }

    document.getElementById("mainUI")
        .style.display = "block";

    render();

    updateCodes();
}

/* =========================
   添加账号
========================= */

async function addAccount(){

    const name = document
        .getElementById("accName")
        .value
        .trim();

    const secret = document
        .getElementById("accSecret")
        .value
        .trim();

    if(!name || !secret){

        alert("不能为空");
        return;
    }

    localAccounts.push({
        id:Date.now(),
        name,
        secret
    });

    await saveVault();

    document.getElementById("accName").value="";
    document.getElementById("accSecret").value="";

    render();

    updateCodes();
}

/* =========================
   删除
========================= */

async function del(id){

    if(!confirm("确定删除？")) return;

    localAccounts = localAccounts.filter(
        x => x.id !== id
    );

    await saveVault();

    render();
}

/* =========================
   渲染
========================= */

function render(){

    const list = document.getElementById("list");

    if(localAccounts.length === 0){

        list.innerHTML = `
        <div class="small">
        暂无账号
        </div>
        `;

        return;
    }

    let html = "";

    for(let acc of localAccounts){

        html += `
        <div class="account">

            <div>
                <div class="name">
                    ${escapeHtml(acc.name)}
                </div>

                <div class="code"
                id="code-${acc.id}">
                    ------
                </div>
            </div>

            <button class="btn-del"
            onclick="del(${acc.id})">
                删除
            </button>

        </div>
        `;
    }

    list.innerHTML = html;
}

/* =========================
   更新验证码
========================= */

async function updateCodes(){

    const epoch = Math.floor(Date.now()/1000);

    const remain = 30 - (epoch % 30);

    document.getElementById("bar")
        .style.width =
        ((remain/30)*100) + "%";

    for(let acc of localAccounts){

        const el = document.getElementById(
            `code-${acc.id}`
        );

        if(el){

            el.innerText =
                await TOTP.generate(acc.secret);
        }
    }
}

setInterval(updateCodes,1000);

/* =========================
   备份
========================= */

function exportBackup(){

    const raw = localStorage.getItem(
        "secure_2fa_vault"
    );

    document.getElementById("backupBox")
        .value = raw || "";
}

async function importBackup(){

    const txt = document
        .getElementById("backupBox")
        .value
        .trim();

    if(!txt){

        alert("请粘贴备份");
        return;
    }

    try{

        JSON.parse(txt);

        localStorage.setItem(
            "secure_2fa_vault",
            txt
        );

        alert("恢复成功");

        location.reload();

    }catch(e){

        alert("无效备份");
    }
}

/* =========================
   安全
========================= */

function escapeHtml(text){

    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

/* =========================
   自动锁定
========================= */

window.addEventListener("beforeunload",()=>{

    localAccounts = [];
    masterPassword = "";
});

</script>

</body>
</html>
