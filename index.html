<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全本地 2FA 管理器</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        #code { font-size: 3rem; font-weight: bold; color: #007bff; margin: 20px 0; letter-spacing: 5px; }
        #timer { color: #666; }
    </style>
</head>
<body>
    <h2>安全本地 2FA 管理器</h2>
    <input type="text" id="secret" placeholder="请手动输入或粘贴 2FA 密钥 (Base32)">
    <div id="code">000000</div>
    <div id="timer">剩余时间: -- 秒</div>

    <script>
        // Base32 解码函数（纯原生）
        function base32ToBuf(str) {
            const b32 = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            str = str.toUpperCase().replace(/=+$/, '');
            const buf = new Uint8Array(Math.ceil(str.length * 5 / 8));
            let bits = 0, value = 0, index = 0;
            for (let i = 0; i < str.length; i++) {
                const val = b32.indexOf(str[i]);
                if (val === -1) continue;
                value = (value << 5) | val;
                bits += 5;
                if (bits >= 8) {
                    buf[index++] = (value >> (bits - 8)) & 255;
                    bits -= 8;
                }
            }
            return buf.subarray(0, index);
        }

        // Web Crypto API 计算 TOTP
        async function generateTOTP() {
            const secretInput = document.getElementById('secret').value.trim();
            if (!secretInput) return;

            try {
                const epoch = Math.floor(Date.now() / 1000);
                const time = BigInt(Math.floor(epoch / 30));
                const remain = 30 - (epoch % 30);
                document.getElementById('timer').innerText = `剩余时间: ${remain} 秒`;

                const keyBuf = base32ToBuf(secretInput);
                const msgBuf = new Uint8Array(8);
                let tempTime = time;
                for (let i = 7; i >= 0; i--) {
                    msgBuf[i] = Number(tempTime & 255n);
                    tempTime >>= 8n;
                }

                const cryptoKey = await crypto.subtle.importKey(
                    "raw", keyBuf, { name: "HMAC", hash: { name: "SHA-1" } }, false, ["sign"]
                );
                const hmac = await crypto.subtle.sign("HMAC", cryptoKey, msgBuf);
                const hmacBuf = new Uint8Array(hmac);
                
                const offset = hmacBuf[hmacBuf.length - 1] & 0xf;
                const code = ((hmacBuf[offset] & 0x7f) << 24) |
                             ((hmacBuf[offset + 1] & 0xff) << 16) |
                             ((hmacBuf[offset + 2] & 0xff) << 8) |
                             (hmacBuf[offset + 3] & 0xff);
                             
                const totp = (code % 1000000).toString().padStart(6, '0');
                document.getElementById('code').innerText = totp;
            } catch (e) {
                document.getElementById('code').innerText = "密钥错误";
            }
        }

        // 每秒刷新一次
        setInterval(generateTOTP, 1000);
        document.getElementById('secret').addEventListener('input', generateTOTP);
    </script>
</body>
</html>
